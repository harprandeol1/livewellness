<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Membership Options | Live Wellness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: #f7f7f7;
        color: #17171c;
        font-family: "Inter", Arial, sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 7vw;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.92);
        color: #fff;
      }

      .logo {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.45em;
        text-transform: uppercase;
      }

      .nav-links {
        display: flex;
        gap: 34px;
        font-size: 12px;
        font-weight: 600;
      }

      .join-btn,
      .dark-btn,
      .light-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 5px;
        font-size: 12px;
        font-weight: 700;
        min-height: 36px;
        padding: 0 16px;
      }

      .join-btn,
      .light-btn {
        background: #fff;
        color: #000;
      }

      .dark-btn {
        background: #050505;
        color: #fff;
      }

      .hero {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: flex-end;
        padding: 124px 7vw 78px;
        background: #020202;
        color: #fff;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 78% 25%, rgba(255, 255, 255, 0.16), transparent 17%),
          radial-gradient(circle at 26% 42%, rgba(255, 70, 118, 0.24), transparent 18%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.05), #000 92%),
          linear-gradient(130deg, #050506, #17171f 46%, #040404);
      }

      .hero::after {
        content: "";
        position: absolute;
        right: 9vw;
        top: 16vh;
        width: min(760px, 55vw);
        height: 440px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.12) 0 1px,
            transparent 1px 82px
          ),
          linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
        box-shadow: 0 0 120px rgba(255, 255, 255, 0.08);
        transform: skewY(-2deg);
      }

      .hero-inner {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 72px;
        align-items: end;
        width: 100%;
        max-width: 1180px;
        margin: 0 auto;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: rgba(255, 255, 255, 0.58);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.42em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      .hero h1 {
        max-width: 760px;
        margin-bottom: 24px;
        font-size: clamp(56px, 7vw, 116px);
        font-weight: 600;
        letter-spacing: -0.08em;
        line-height: 0.9;
      }

      .hero p {
        max-width: 560px;
        margin-bottom: 0;
        color: rgba(255, 255, 255, 0.72);
        font-size: 16px;
        line-height: 1.6;
      }

      .hero-panel {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
        color: #111;
        padding: 28px;
      }

      .hero-panel span {
        display: block;
        margin-bottom: 44px;
        color: #777;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .hero-panel h2 {
        margin-bottom: 14px;
        font-size: 32px;
        letter-spacing: -0.07em;
        line-height: 0.98;
      }

      .hero-panel p {
        color: #62626a;
        font-size: 14px;
      }

      .section {
        padding: 120px 7vw;
      }

      .section-intro {
        max-width: 780px;
        margin: 0 auto 64px;
        text-align: center;
      }

      .label {
        margin-bottom: 18px;
        color: #777;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.42em;
        text-transform: uppercase;
      }

      .section-intro h2,
      .cta h2 {
        margin-bottom: 22px;
        font-size: clamp(42px, 5vw, 82px);
        letter-spacing: -0.08em;
        line-height: 0.94;
      }

      .section-intro p {
        color: #666;
        line-height: 1.7;
      }

      .options {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        max-width: 1180px;
        margin: 0 auto;
      }

      .option {
        min-height: 430px;
        border: 1px solid #e8e8e8;
        border-radius: 16px;
        background: #fff;
        padding: 30px;
      }

      .option.feature {
        color: #fff;
        background:
          radial-gradient(circle at 82% 12%, rgba(255, 255, 255, 0.64), transparent 17%),
          radial-gradient(circle at 34% 44%, rgba(255, 188, 203, 0.64), transparent 28%),
          linear-gradient(135deg, #ff315f, #ff7490);
      }

      .option.dark {
        background: #050505;
        color: #fff;
      }

      .option-number {
        display: block;
        margin-bottom: 58px;
        color: #888;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .option.feature .option-number,
      .option.dark .option-number {
        color: rgba(255, 255, 255, 0.68);
      }

      .option h3 {
        margin-bottom: 18px;
        font-size: 34px;
        letter-spacing: -0.07em;
        line-height: 0.98;
      }

      .option p,
      .option li {
        color: #666;
        line-height: 1.65;
      }

      .option.feature p,
      .option.feature li,
      .option.dark p,
      .option.dark li {
        color: rgba(255, 255, 255, 0.75);
      }

      .option ul {
        display: grid;
        gap: 9px;
        margin: 22px 0 0;
        padding: 0;
        list-style: none;
      }

      .option li::before {
        content: "+ ";
      }

      .compare-strip {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 28px;
        align-items: center;
        max-width: 1180px;
        margin: 12px auto 0;
        border: 1px solid #e8e8e8;
        border-radius: 16px;
        background: #fff;
        padding: 28px;
      }

      .compare-strip h3 {
        margin-bottom: 8px;
        font-size: 28px;
        letter-spacing: -0.06em;
      }

      .compare-strip p {
        margin-bottom: 0;
        color: #666;
        line-height: 1.7;
      }

      .details {
        max-width: 1180px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 0.9fr 1fr;
        gap: 74px;
        align-items: center;
      }

      .details-art {
        min-height: 560px;
        border-radius: 18px;
        background:
          radial-gradient(circle at 45% 38%, rgba(255, 75, 120, 0.82), transparent 20%),
          radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.5), transparent 13%),
          linear-gradient(135deg, #16161d, #3b2532 55%, #ff829a);
        position: relative;
        overflow: hidden;
      }

      .details-art::after {
        content: "5 tiers";
        position: absolute;
        left: 36px;
        bottom: 36px;
        width: 190px;
        padding: 24px;
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.42);
        color: #fff;
        font-size: 48px;
        letter-spacing: -0.08em;
        backdrop-filter: blur(10px);
      }

      .details-copy h2 {
        margin-bottom: 22px;
        font-size: clamp(42px, 5vw, 82px);
        letter-spacing: -0.08em;
        line-height: 0.94;
      }

      .details-copy p {
        color: #666;
        line-height: 1.75;
      }

      .dark-section {
        background: #050505;
        color: #fff;
      }

        grid-template-columns: 0.9fr 1fr;
        gap: 80px;
